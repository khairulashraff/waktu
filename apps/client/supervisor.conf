[waktu:client]
; The command to run your built Electron application.
; The executable name 'Waktu' is based on the 'productName' in your electron-builder.yml
command=waktu-react

; The directory where your application is deployed on the target host.
; Set this to match REMOTE_APP_DIR from .env.deploy.
directory=/opt/waktu/client

; Run as the 'root' user. Change if you run your GUI as a different user.
user=root

; --- Autostart and Autorestart ---
autostart=true
autorestart=true

; --- Logging ---
stdout_logfile=/var/log/waktu-client.log
stderr_logfile=/var/log/waktu-client.err.log

; --- Environment Variables for GUI applications ---
; Electron apps need a display to run. If you are running a desktop environment
; on your Raspberry Pi, you may need to set the DISPLAY variable.
; Typically, this is :0. Uncomment the line below if your app fails to start.
; environment=DISPLAY=":0"
