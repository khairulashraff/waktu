<svg width="100%" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
    <clipPath id="above">
        <rect x="0" y="0" width="680" height="280" />
    </clipPath>

    <line x1="80" y1="280" x2="600" y2="280" stroke="currentColor" stroke-width="10" stroke-linecap="round"
        style="fill:rgb(0, 0, 0);stroke:currentColor;currentColor;stroke-width:16px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto" />

    <g clip-path="url(#above)"
